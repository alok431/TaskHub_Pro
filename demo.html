<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App Look & Feel Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Default: Shards Theme (Purple & Orange) */
            --bg-color: #0b0c10;
            --card-bg: #161824;
            --primary-color: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --secondary-btn: #2a2d3e;
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --accent-color: #f97316;
            --accent-glow: rgba(249, 115, 22, 0.4);
            --success-color: #10b981;
            --banner-gradient: linear-gradient(135deg, #4c1d95, #9a3412);
        }

        [data-theme="cyan"] {
            --bg-color: #051014;
            --card-bg: #102026;
            --primary-color: #06b6d4;
            --primary-glow: rgba(6, 182, 212, 0.4);
            --secondary-btn: #1a3038;
            --accent-color: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --banner-gradient: linear-gradient(135deg, #0891b2, #047857);
        }
        
        [data-theme="neon"] {
            --bg-color: #090914;
            --card-bg: #15152a;
            --primary-color: #ec4899;
            --primary-glow: rgba(236, 72, 153, 0.4);
            --secondary-btn: #222238;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --banner-gradient: linear-gradient(135deg, #be185d, #1d4ed8);
        }

        [data-theme="gold"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-color: #eab308;
            --primary-glow: rgba(234, 179, 8, 0.4);
            --secondary-btn: #2d2d2d;
            --accent-color: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.4);
            --banner-gradient: linear-gradient(135deg, #854d0e, #991b1b);
        }

        [data-theme="emerald"] {
            --bg-color: #022c22;
            --card-bg: #064e3b;
            --primary-color: #34d399;
            --primary-glow: rgba(52, 211, 153, 0.4);
            --secondary-btn: #065f46;
            --accent-color: #fcd34d;
            --accent-glow: rgba(252, 211, 77, 0.4);
            --banner-gradient: linear-gradient(135deg, #065f46, #0f766e);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            position: relative;
            padding: 20px 20px 100px 20px;
            overflow-x: hidden;
        }

        /* Theme Switcher - Dev Only */
        .theme-switcher-wrapper {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .theme-switcher-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .theme-switcher { display: flex; gap: 12px; }
        .theme-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .theme-btn:hover, .theme-btn.active { border-color: white; transform: scale(1.15); }
        .theme-btn.default { background: linear-gradient(135deg, #8b5cf6, #f97316); }
        .theme-btn.cyan { background: linear-gradient(135deg, #06b6d4, #10b981); }
        .theme-btn.neon { background: linear-gradient(135deg, #ec4899, #3b82f6); }
        .theme-btn.gold { background: linear-gradient(135deg, #eab308, #ef4444); }
        .theme-btn.emerald { background: linear-gradient(135deg, #34d399, #fcd34d); }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 44px; height: 44px;
            border-radius: 14px;
            background: var(--primary-color);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .avatar-icon { font-size: 20px; color: white; }
        .user-info h1 { font-size: 18px; font-weight: 700; line-height: 1.2; }
        .username { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        
        .status-badge {
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .dot { width: 8px; height: 8px; background: var(--success-color); border-radius: 50%; box-shadow: 0 0 8px var(--success-color); }

        /* Card */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: background-color 0.3s ease;
        }
        
        .balance-card { position: relative; overflow: hidden; }
        .card-subtitle { font-size: 12px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
        .balance-amount { font-size: 56px; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; letter-spacing: -1px; }
        .balance-meta { display: flex; align-items: center; gap: 12px; }
        .usd-value { color: var(--success-color); font-weight: 600; font-size: 14px; background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 12px;}
        .earn-more { color: var(--text-muted); font-size: 14px; text-decoration: none; font-weight: 500; }
        .shard-icon {
            position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
            font-size: 50px; color: var(--primary-color);
            filter: drop-shadow(0 0 25px var(--primary-glow));
            opacity: 0.9;
        }

        /* Action Buttons */
        .action-buttons { display: flex; gap: 12px; margin-bottom: 24px; }
        .btn {
            flex: 1; padding: 16px; border-radius: 16px; border: none; font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary-color); box-shadow: 0 8px 24px var(--primary-glow); }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary { background: var(--secondary-btn); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        /* Banner */
        .special-tasks-banner {
            background: var(--banner-gradient);
            border-radius: 20px;
            padding: 20px;
            display: flex; align-items: center; gap: 16px;
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: background 0.3s ease;
        }
        .st-icon-wrapper {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, #ffffff, #e2e8f0);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .st-icon-wrapper i { color: var(--primary-color); font-size: 28px; transition: color 0.3s ease; }
        .st-content { flex: 1; }
        .st-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .st-header h3 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .st-tag { background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; color: #fcd34d; border: 1px solid rgba(252,211,77,0.3); }
        .st-content p { font-size: 13px; color: rgba(255,255,255,0.9); margin-bottom: 12px; line-height: 1.4; }
        .st-content p span { color: #fcd34d; font-weight: 700; }
        .st-pill {
            background: rgba(0,0,0,0.3); padding: 6px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1);
        }
        .st-action-btn {
            width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .st-action-btn:hover { background: rgba(255,255,255,0.25); transform: translateX(3px); }

        .section-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; margin-top: 10px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card-bg);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-around; align-items: center;
            padding: 12px 0; padding-bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            transition: background-color 0.3s ease;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: var(--text-muted); text-decoration: none; font-size: 11px; font-weight: 500;
            transition: 0.2s; width: 20%; position: relative;
        }
        .nav-item i { font-size: 22px; }
        .nav-item.active { color: var(--primary-color); font-weight: 600; }
        .nav-item.active::after {
            content: ''; position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 3px; border-radius: 0 0 3px 3px;
            background: var(--primary-color);
            box-shadow: 0 2px 10px var(--primary-glow);
        }
        .nav-center { position: relative; }
        .center-btn {
            width: 60px; height: 60px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            box-shadow: 0 10px 24px var(--accent-glow);
            border: 5px solid var(--bg-color);
            transition: all 0.3s ease;
        }
        .center-btn i { color: white; font-size: 26px; }
        .center-btn:hover { transform: translateX(-50%) scale(1.05); }
        .nav-center span { margin-top: 26px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Theme Switcher -->
    <div class="theme-switcher-wrapper">
        <div class="theme-switcher-title">Choose Your Theme</div>
        <div class="theme-switcher">
            <div class="theme-btn default active" onclick="setTheme('default')" title="Shards (Purple)"></div>
            <div class="theme-btn cyan" onclick="setTheme('cyan')" title="Cyan & Green"></div>
            <div class="theme-btn neon" onclick="setTheme('neon')" title="Neon (Pink & Blue)"></div>
            <div class="theme-btn gold" onclick="setTheme('gold')" title="Gold & Red"></div>
            <div class="theme-btn emerald" onclick="setTheme('emerald')" title="Emerald"></div>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="user-info">
            <div class="avatar">
                <i class="fa-solid fa-gem avatar-icon"></i>
            </div>
            <div>
                <h1>TaskHub</h1>
                <div class="username">@user_demo</div>
            </div>
        </div>
        <div class="status-badge">
            <div class="dot"></div> Online
        </div>
    </div>

    <!-- Balance -->
    <div class="card balance-card">
        <div class="card-subtitle">YOUR BALANCE</div>
        <div class="balance-amount">70</div>
        <div class="balance-meta">
            <span class="usd-value">≈$0.007 USDT</span>
            <a href="#" class="earn-more">Earn more &rarr;</a>
        </div>
        <i class="fa-solid fa-gem shard-icon"></i>
    </div>

    <!-- Actions -->
    <div class="action-buttons">
        <button class="btn btn-primary">
            <i class="fa-solid fa-bolt"></i> Earn
        </button>
        <button class="btn btn-secondary">
            <i class="fa-solid fa-wallet"></i> Withdraw
        </button>
    </div>

    <!-- Special Tasks -->
    <div class="special-tasks-banner">
        <div class="st-icon-wrapper">
            <i class="fa-solid fa-play"></i>
        </div>
        <div class="st-content">
            <div class="st-header">
                <h3><i class="fa-solid fa-star" style="color: #fcd34d;"></i> Special Tasks</h3>
                <div class="st-tag"><i class="fa-solid fa-sparkles"></i> SPECIAL</div>
            </div>
            <p>Complete quick tasks & earn <span>$0.1+</span> easily</p>
            <div class="st-pill">
                <i class="fa-solid fa-gem" style="color: #e2e8f0;"></i> Earn $0.1+ USDT per task
            </div>
        </div>
        <button class="st-action-btn"><i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <div class="section-title">
        <i class="fa-solid fa-sack-dollar" style="color: #fcd34d;"></i> Watch Ads & Earn!
    </div>
    
    <!-- Placeholder for extra content to allow scrolling if needed -->
    <div class="card" style="margin-top: 10px; min-height: 100px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); opacity: 0.5;">
        Ad Content Area
    </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fa-solid fa-border-all"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-list-check"></i><span>Earn</span></a>
    <a href="#" class="nav-item nav-center">
        <div class="center-btn"><i class="fa-solid fa-gamepad"></i></div>
        <span>Play</span>
    </a>
    <a href="#" class="nav-item"><i class="fa-solid fa-gift"></i><span>Refer</span></a>
    <a href="#" class="nav-item"><i class="fa-regular fa-user"></i><span>Account</span></a>
</nav>

<script>
    function setTheme(themeName) {
        document.body.setAttribute('data-theme', themeName);
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.theme-btn.${themeName}`).classList.add('active');
    }
</script>

</body>
</html>
